# ==============================================
# Cloudflare Workers 設定（API サーバー）
# ==============================================
# oRPC + Hono API を Cloudflare Workers にデプロイする。
#
# デプロイコマンド:
#   staging:    bunx wrangler deploy --env staging
#   production: bunx wrangler deploy --env production
#
# ローカル開発:
#   bun run dev       → wrangler dev（D1 ローカル SQLite を使用）
#   bun run dev:bun   → Bun.serve（D1 なし、インメモリフォールバック）
#
# D1 データベースで TODO を永続化する。
# マイグレーション生成: bunx drizzle-kit generate
# マイグレーション適用:
#   ローカル: bunx wrangler d1 migrations apply storybook-vrt-sample-db --local
#   リモート: bunx wrangler d1 migrations apply storybook-vrt-sample-db --remote
# ==============================================

name = "storybook-vrt-sample-api"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

# D1 データベースバインディング
[[d1_databases]]
binding = "DB"
database_name = "storybook-vrt-sample-db"
database_id = "b63022aa-a134-4405-ac8d-dec45b097e73"
migrations_dir = "drizzle"

# staging 環境
[env.staging]
name = "storybook-vrt-sample-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "storybook-vrt-sample-db"
database_id = "b63022aa-a134-4405-ac8d-dec45b097e73"
migrations_dir = "drizzle"

# production 環境
[env.production]
name = "storybook-vrt-sample-api-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "storybook-vrt-sample-db"
database_id = "b63022aa-a134-4405-ac8d-dec45b097e73"
migrations_dir = "drizzle"
