# ==============================================
# Storybook Chromatic デプロイワークフロー
# ==============================================
# Storybook を Chromatic へデプロイする。
# - main push 時: プロダクションデプロイ（paths フィルタで対象を限定）
# - PR 時: 全 PR で起動し、paths-filter でジョブレベル skip する
#   skip されたジョブは GitHub 上で pass 扱いになるため、
#   required status checks と paths フィルタを両立できる。
# ビジュアルテストは storybook-addon-vis + reg-cli で構築済みのため、
# Chromatic は Storybook ホスティング専用として使用する。
#
# 必要な設定:
#   Secrets:
#     CHROMATIC_PROJECT_TOKEN — Chromatic > Manage > Configure > Project Token
#
# 公式ドキュメント:
#   https://www.chromatic.com/docs/github-actions/
# ==============================================
name: 🎨 Storybook Chromatic Deploy

on:
  # main push 時: Chromatic へプロダクションデプロイ
  push:
    branches: [main]
    paths:
      - "packages/ui/**"
      - "bun.lock"
      - ".github/workflows/storybook-chromatic-deploy.yml"
  # PR 時: 全 PR で起動し、changes ジョブで paths をチェック（Draft PR は skip）
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write

jobs:
  changes:
    name: 🎨 Chromatic / changes
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: AurorNZ/paths-filter@c9dd42e99db87803313ff6f4b1150cc9f6c836af # v5
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            ui:
              - 'packages/ui/**'
              - 'bun.lock'
              - '.github/workflows/storybook-chromatic-deploy.yml'

  deploy:
    name: 🎨 Deploy to Chromatic
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ────────────────────────────────────────
      # セットアップ
      # ────────────────────────────────────────
      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Chromatic はコミット履歴を使って変更差分を検出するため全履歴が必要
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ────────────────────────────────────────
      # ビルド
      # ────────────────────────────────────────

      # chromaui/action 内部は node20 で動くため、
      # bun で事前ビルドして storybookBuildDir で渡す
      - name: Build Storybook
        run: bun run build-storybook
        working-directory: packages/ui

      # ────────────────────────────────────────
      # デプロイ
      # ────────────────────────────────────────

      - name: Deploy to Chromatic
        id: chromatic
        uses: chromaui/action@7d51ab74dfbe4810b90d01a1b89513b9f2f1a266 # v16
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: packages/ui/storybook-static
          # アップロード完了後に即終了（ビジュアルテストの完了を待たない）
          exitOnceUploaded: true
          # すべてのスナップショット差分を自動承認（VRT は別ツールで実施済みのため）
          autoAcceptChanges: true

      # ────────────────────────────────────────
      # レポート
      # ────────────────────────────────────────

      # Job Summary にビルド結果の URL を表示
      - name: Add summary
        run: |
          echo "## 🎨 Chromatic" >> $GITHUB_STEP_SUMMARY
          echo "| Key | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Storybook | ${{ steps.chromatic.outputs.storybookUrl }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.chromatic.outputs.buildUrl }} |" >> $GITHUB_STEP_SUMMARY

      # sticky-pull-request-comment: 同じ header のコメントがあれば更新、なければ新規作成
      # storybookUrl はコミットごとの URL（PR 時点の Storybook を確認できる）
      - name: Comment PR with Storybook link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          header: chromatic-storybook
          message: |
            ## 🎨 Chromatic Storybook Preview

            | Key | URL |
            |-----|-----|
            | Storybook | ${{ steps.chromatic.outputs.storybookUrl }} |
            | Build | ${{ steps.chromatic.outputs.buildUrl }} |
