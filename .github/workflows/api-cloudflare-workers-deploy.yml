# ==============================================
# API Cloudflare Workers デプロイワークフロー
# ==============================================
# oRPC + Hono API を Cloudflare Workers へデプロイする。
#
# 3環境構成:
#   PR              → PR ごとの動的 Worker を作成（PR番号+ブランチ名入り URL）
#   main push       → staging Worker にライブデプロイ
#   workflow_dispatch → production Worker にライブデプロイ
#
# paths-filter でジョブレベル skip する。
# skip されたジョブは GitHub 上で pass 扱いになるため、
# required status checks と paths フィルタを両立できる。
#
# 必要な設定:
#   Secrets:
#     CLOUDFLARE_API_TOKEN    — Cloudflare API Token「GitHub Actions - Cloudflare Pages / Workers」
#       権限: Cloudflare Pages: Edit, Workers Scripts: Edit, Workers KV Storage: Edit
#       ※ Storybook Cloudflare Deploy と同一トークンを共有
# ==============================================
name: ⚡ API Cloudflare Workers Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/api-contract/**"
      - "bun.lock"
      - ".github/workflows/api-cloudflare-workers-deploy.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write

jobs:
  changes:
    name: ⚡ API Workers / changes
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.filter.outputs.api }}
    steps:
      - uses: AurorNZ/paths-filter@c9dd42e99db87803313ff6f4b1150cc9f6c836af # v5
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/api-contract/**'
              - 'bun.lock'
              - '.github/workflows/api-cloudflare-workers-deploy.yml'

  deploy:
    name: ⚡ Deploy API to Cloudflare Workers
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ────────────────────────────────────────
      # セットアップ
      # ────────────────────────────────────────
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ────────────────────────────────────────
      # デプロイ
      # ────────────────────────────────────────

      # PR 時: 動的 Worker 名を計算（PR番号+ブランチ名）
      - name: Compute preview worker name
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          BRANCH=$(echo "${{ github.head_ref }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          WORKER_NAME="storybook-vrt-sample-api-pr-${{ github.event.pull_request.number }}-${BRANCH}"
          WORKER_NAME=$(echo "$WORKER_NAME" | cut -c1-54 | sed 's/-$//')
          echo "worker-name=$WORKER_NAME" >> $GITHUB_OUTPUT

      # PR → 動的 Worker にデプロイ（--name で Worker 名を上書き、D1 は staging を共有）
      # main push → staging、workflow_dispatch → production
      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 95d6c4c8536abbe739beadf65c380ae4
          workingDirectory: apps/api
          command: deploy --env ${{ github.event_name == 'workflow_dispatch' && 'production' || 'staging' }}${{ github.event_name == 'pull_request' && format(' --name {0} --var DEPLOY_ENV:{0}', steps.preview.outputs.worker-name) || '' }}

      # ────────────────────────────────────────
      # レポート
      # ────────────────────────────────────────

      - name: Add summary
        env:
          WRANGLER_ENV: ${{ github.event_name == 'workflow_dispatch' && 'production' || 'staging' }}
        run: |
          echo "## ⚡ API Cloudflare Workers (${{ env.WRANGLER_ENV }})" >> $GITHUB_STEP_SUMMARY
          echo "Deploy completed for environment: **${{ env.WRANGLER_ENV }}**" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with deploy info
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          header: cloudflare-api-workers
          message: |
            ## ⚡ API Cloudflare Workers Preview

            | Key | URL |
            |-----|-----|
            | API Preview | https://${{ steps.preview.outputs.worker-name }}.samonikura100.workers.dev |
            | Health Check | https://${{ steps.preview.outputs.worker-name }}.samonikura100.workers.dev/api/health |
