# ==============================================
# API Cloudflare Workers デプロイワークフロー
# ==============================================
# oRPC + Hono API を Cloudflare Workers へデプロイする。
# - main push 時: production 環境にデプロイ（paths フィルタで対象を限定）
# - PR 時: 全 PR で起動し、paths-filter でジョブレベル skip する
#   skip されたジョブは GitHub 上で pass 扱いになるため、
#   required status checks と paths フィルタを両立できる。
#
# 必要な設定:
#   Secrets:
#     CLOUDFLARE_API_TOKEN    — Cloudflare API Token「GitHub Actions - Cloudflare Pages / Workers」
#       権限: Cloudflare Pages: Edit, Workers Scripts: Edit
#       ※ Storybook Cloudflare Deploy と同一トークンを共有
# ==============================================
name: ⚡ API Cloudflare Workers Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/api-contract/**"
      - "bun.lock"
      - ".github/workflows/api-cloudflare-workers-deploy.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write

jobs:
  changes:
    name: ⚡ API Workers / changes
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.filter.outputs.api }}
    steps:
      - uses: AurorNZ/paths-filter@c9dd42e99db87803313ff6f4b1150cc9f6c836af # v5
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/api-contract/**'
              - 'bun.lock'
              - '.github/workflows/api-cloudflare-workers-deploy.yml'

  deploy:
    name: ⚡ Deploy API to Cloudflare Workers
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ────────────────────────────────────────
      # セットアップ
      # ────────────────────────────────────────
      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ────────────────────────────────────────
      # デプロイ
      # ────────────────────────────────────────

      # main push → production、PR → staging
      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 95d6c4c8536abbe739beadf65c380ae4
          workingDirectory: apps/api
          command: deploy --env ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || 'staging' }}

      # ────────────────────────────────────────
      # レポート
      # ────────────────────────────────────────

      - name: Add summary
        run: |
          ENV=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || 'staging' }}
          echo "## ⚡ API Cloudflare Workers ($ENV)" >> $GITHUB_STEP_SUMMARY
          echo "Deploy completed for environment: **$ENV**" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with deploy info
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: cloudflare-api-workers
          message: |
            ## ⚡ API Cloudflare Workers Preview

            API が staging 環境にデプロイされました。
