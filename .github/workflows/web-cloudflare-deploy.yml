# ==============================================
# Web Cloudflare Workers デプロイワークフロー
# ==============================================
# Next.js Web アプリを OpenNext 経由で Cloudflare Workers へデプロイする。
# - main push 時: production 環境にデプロイ（paths フィルタで対象を限定）
# - PR 時: 全 PR で起動し、paths-filter でジョブレベル skip する
#   skip されたジョブは GitHub 上で pass 扱いになるため、
#   required status checks と paths フィルタを両立できる。
#
# ビルドフロー:
#   opennextjs-cloudflare build → .open-next/ に出力 → wrangler deploy
#
# 必要な設定:
#   Secrets:
#     CLOUDFLARE_API_TOKEN    — Cloudflare API Token
#       権限: Cloudflare Pages: Edit, Workers Scripts: Edit
#       ※ API Workers Deploy / Storybook Cloudflare Deploy と同一トークンを共有
#     DOTENV_PRIVATE_KEY      — dotenvx 復号キー（.env の NEXT_PUBLIC_* をビルド時に注入）
#   Variables:
#     CLOUDFLARE_ACCOUNT_ID   — Cloudflare アカウント ID
# ==============================================
name: 🌐 Web Cloudflare Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "bun.lock"
      - ".github/workflows/web-cloudflare-deploy.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write

jobs:
  changes:
    name: 🌐 Web Deploy / changes
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.filter.outputs.web }}
    steps:
      - uses: AurorNZ/paths-filter@c9dd42e99db87803313ff6f4b1150cc9f6c836af # v5
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'bun.lock'
              - '.github/workflows/web-cloudflare-deploy.yml'

  deploy:
    name: 🌐 Deploy Web to Cloudflare Workers
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # dotenvx で .env を復号するために必要（NEXT_PUBLIC_SENTRY_DSN 等）
      DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
    steps:
      # ────────────────────────────────────────
      # セットアップ
      # ────────────────────────────────────────
      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ────────────────────────────────────────
      # ビルド & デプロイ
      # ────────────────────────────────────────

      # OpenNext で Next.js を Cloudflare Workers 用にビルド
      - name: Build with OpenNext
        working-directory: apps/web
        run: bunx opennextjs-cloudflare build

      # main push → production（wrangler deploy）、PR → preview（wrangler versions upload）
      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 95d6c4c8536abbe739beadf65c380ae4
          workingDirectory: apps/web
          packageManager: bunx
          command: deploy

      # ────────────────────────────────────────
      # レポート
      # ────────────────────────────────────────

      - name: Add summary
        run: |
          echo "## 🌐 Web Cloudflare Deploy" >> $GITHUB_STEP_SUMMARY
          echo "Deploy completed." >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with deploy info
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: cloudflare-web
          message: |
            ## 🌐 Web Cloudflare Deploy

            Web アプリが Cloudflare Workers にデプロイされました。
