# ==============================================
# Web Cloudflare Workers デプロイワークフロー
# ==============================================
# Next.js Web アプリを OpenNext 経由で Cloudflare Workers へデプロイする。
#
# 3環境構成:
#   PR              → PR ごとの動的 Worker を作成（PR番号+ブランチ名入り URL）
#   main push       → staging Worker にライブデプロイ
#   workflow_dispatch → production Worker にライブデプロイ
#
# paths-filter でジョブレベル skip する。
# skip されたジョブは GitHub 上で pass 扱いになるため、
# required status checks と paths フィルタを両立できる。
#
# ビルドフロー:
#   opennextjs-cloudflare build → .open-next/ に出力 → wrangler deploy
#
# 必要な設定:
#   Secrets:
#     CLOUDFLARE_API_TOKEN    — Cloudflare API Token
#       権限: Cloudflare Pages: Edit, Workers Scripts: Edit, Workers KV Storage: Edit
#       ※ API Workers Deploy / Storybook Cloudflare Deploy と同一トークンを共有
#     DOTENV_PRIVATE_KEY      — dotenvx 復号キー（暗号化された環境変数がある場合に必要）
#   Variables:
#     CLOUDFLARE_ACCOUNT_ID   — Cloudflare アカウント ID
# ==============================================
name: 🌐 Web Cloudflare Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "bun.lock"
      - ".github/workflows/web-cloudflare-deploy.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write

jobs:
  changes:
    name: 🌐 Web Deploy / changes
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.filter.outputs.web }}
    steps:
      - uses: AurorNZ/paths-filter@c9dd42e99db87803313ff6f4b1150cc9f6c836af # v5
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'bun.lock'
              - '.github/workflows/web-cloudflare-deploy.yml'

  deploy:
    name: 🌐 Deploy Web to Cloudflare Workers
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # workflow_dispatch → production、それ以外（PR / main push）→ development（Staging API）
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && 'production' || 'development' }}
      # workflow_dispatch → production、それ以外 → staging
      WRANGLER_ENV: ${{ github.event_name == 'workflow_dispatch' && 'production' || 'staging' }}
      # dotenvx が暗号化された .env 変数を復号するために必要
      # 現在は NEXT_PUBLIC_* のみ（平文）で復号不要だが、Better Auth 導入時に必要になるため維持
      DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
    steps:
      # ────────────────────────────────────────
      # セットアップ
      # ────────────────────────────────────────
      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ────────────────────────────────────────
      # ビルド & デプロイ
      # ────────────────────────────────────────

      # PR 時: 動的 Worker 名を計算（PR番号+ブランチ名）
      - name: Compute preview worker name
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          BRANCH=$(echo "${{ github.head_ref }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          WORKER_NAME="storybook-vrt-sample-web-pr-${{ github.event.pull_request.number }}-${BRANCH}"
          WORKER_NAME=$(echo "$WORKER_NAME" | cut -c1-54 | sed 's/-$//')
          echo "worker-name=$WORKER_NAME" >> $GITHUB_OUTPUT

      # PR 時: wrangler.jsonc の staging env を動的 Worker 名に書き換え
      # WORKER_SELF_REFERENCE が自身を正しく参照するために必要
      - name: Override wrangler config for preview
        if: github.event_name == 'pull_request'
        working-directory: apps/web
        run: |
          WORKER_NAME="${{ steps.preview.outputs.worker-name }}"
          sed -i 's/"name": "storybook-vrt-sample-web-staging"/"name": "'"$WORKER_NAME"'"/' wrangler.jsonc
          sed -i 's/"service": "storybook-vrt-sample-web-staging"/"service": "'"$WORKER_NAME"'"/' wrangler.jsonc

      # OpenNext で Next.js を Cloudflare Workers 用にビルド
      # dotenvx で環境別 .env を読み込み、NEXT_PUBLIC_* をビルドに埋め込む
      # workflow_dispatch → .env.production、それ以外 → .env.development（Staging API）
      - name: Build with OpenNext
        working-directory: apps/web
        run: bunx dotenvx run -f .env.${{ env.DEPLOY_ENV }} -- bun run build:cf

      # PR → 動的 Worker にデプロイ、main push → staging、workflow_dispatch → production
      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 95d6c4c8536abbe739beadf65c380ae4
          workingDirectory: apps/web
          packageManager: bun
          command: deploy --env ${{ env.WRANGLER_ENV }}

      # ────────────────────────────────────────
      # レポート
      # ────────────────────────────────────────

      - name: Add summary
        run: |
          echo "## 🌐 Web Cloudflare Deploy (${{ env.WRANGLER_ENV }})" >> $GITHUB_STEP_SUMMARY
          echo "Deploy completed for environment: **${{ env.WRANGLER_ENV }}**" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with deploy info
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          header: cloudflare-web
          message: |
            ## 🌐 Web Cloudflare Preview

            | Key | URL |
            |-----|-----|
            | Preview | https://${{ steps.preview.outputs.worker-name }}.samonikura100.workers.dev |
