# E2E テストワークフロー
#
# PR 時: Staging API に疎通して E2E テストを実行
# main push 時: Production API に疎通して E2E テストを実行（デプロイ後のスモーク確認）
#
# paths-filter でジョブレベル skip する。
# skip されたジョブは GitHub 上で pass 扱いになるため、
# required status checks と paths フィルタを両立できる。
#
# CI では next build → next start（本番サーバー）でテスト実行。
# ローカルでは next dev（開発サーバー）で実行（playwright.config.ts で分岐）。
#
# 環境変数: .env.staging / .env.production で管理（NEXT_PUBLIC_* は平文）
# サーバー専用の秘密情報（AUTH_SECRET 等）を追加した場合は DOTENV_PRIVATE_KEY シークレットが必要になる
name: 🧪 E2E Tests

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/api-contract/**"
      - "bun.lock"
      - ".github/workflows/web-e2e.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pull-requests: write

# PR → staging、main push → production
env:
  DEPLOY_ENV: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || 'development' }}
  REPORT_PREFIX: ${{ github.event.pull_request.number && format('pr/{0}', github.event.pull_request.number) || format('manual/{0}', github.run_id) }}

jobs:
  changes:
    name: 🧪 E2E / changes
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.filter.outputs.app }}
    steps:
      # AurorNZ/paths-filter: dorny/paths-filter のフォーク。
      # 本家は 2024-03 以降メンテナンス停滞し Node20 非推奨化（2026-04）への
      # 対応が見込めないため、Node24 対応済み・API 完全互換の AurorNZ 版に移行。
      - uses: AurorNZ/paths-filter@c9dd42e99db87803313ff6f4b1150cc9f6c836af # v5
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            app:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'packages/api-contract/**'
              - 'bun.lock'
              - '.github/workflows/web-e2e.yml'

  test:
    name: "\U0001F9EA E2E Test Report"
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # ────────────────────────────────────────
      # セットアップ
      # ────────────────────────────────────────

      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # bun をセットアップ（パッケージマネージャー）
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      # Playwright ブラウザバイナリのキャッシュ（Chromium のみ）
      # キーに Playwright バージョンを含め、バージョン更新時に自動で再ダウンロードされる
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      # キャッシュヒット時もシステム依存（libgbm 等）のインストールは必要
      - name: Install Playwright system dependencies
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      # モノレポ全体の依存関係をインストール（lockfile を厳密に使用）
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ────────────────────────────────────────
      # ビルド → テスト実行
      # ────────────────────────────────────────

      # Next.js ビルド（NEXT_PUBLIC_* はビルド時に JS に埋め込まれる）
      #
      # なぜ `bun run build`（package.json の --convention=nextjs）ではなく
      # `bunx dotenvx run -f` で明示指定しているか:
      #
      #   next build は常に NODE_ENV=production をセットする。
      #   そのため --convention=nextjs だと .env.production が自動選択され、
      #   Production API の URL がビルドに埋め込まれてしまう。
      #   PR 時は Staging API でテストしたいので、DEPLOY_ENV に応じて
      #   .env.development（Staging）or .env.production を -f で明示指定する。
      #
      #   NODE_ENV=development next build で回避しない理由:
      #   Next.js は NODE_ENV=production でのビルドを前提としており、
      #   development でビルドすると React が開発モード（パフォーマンス警告、DevTools 有効）
      #   のままバンドルされ、最適化（minify、tree-shaking）も無効になる。
      #   本番と異なるバンドルでの E2E テストは「本番に近い環境で検証する」目的に反する。
      #
      #   bunx dotenvx を使う理由:
      #   CI にグローバルの dotenvx はインストールされていないが、
      #   bunx 経由なら devDependencies の @dotenvx/dotenvx を使える。
      - name: Build
        run: bunx dotenvx run -f .env.${{ env.DEPLOY_ENV }} -- next build
        working-directory: apps/web

      # Playwright テスト実行（next start で本番サーバーを起動）
      - name: Run Playwright tests
        run: bunx playwright test
        working-directory: apps/web
        env:
          CI: true

      # ────────────────────────────────────────
      # アップロード＆デプロイ
      # ────────────────────────────────────────

      # テスト失敗時のみ: デバッグ用にテスト結果（スクリーンショット・トレース等）をアップロード
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: web-e2e-report
          path: apps/web/test-results/
          retention-days: 30

      # Playwright 標準の HTML レポートをアーティファクトとしてアップロード
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: web-e2e-html-report
          path: apps/web/playwright-report/
          retention-days: 30

      # HTML レポートを GitHub Pages にデプロイするためステージング
      - name: Stage reports for GitHub Pages
        if: always()
        run: |
          DEST="${{ env.REPORT_PREFIX }}/web-e2e"
          mkdir -p _gh-pages-staging/${DEST}/html-report
          cp -r playwright-report/* _gh-pages-staging/${DEST}/html-report/ || true
        working-directory: apps/web

      # deploy ジョブに渡すためのアーティファクト（ステージング済みディレクトリ一式）
      - name: Upload deploy payload
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: web-e2e-deploy-payload
          path: apps/web/_gh-pages-staging/
          retention-days: 1

  # ────────────────────────────────────────
  # デプロイ（gh-pages への push のみ直列化）
  # ────────────────────────────────────────
  deploy:
    name: "📊 Deploy E2E Test Report"
    needs: [changes, test]
    if: (github.event_name != 'pull_request' || needs.changes.outputs.should-run == 'true') && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # gh-pages ブランチへの push が競合しないようにキューイング
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download deploy payload
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: web-e2e-deploy-payload
          path: _gh-pages-staging/

      # peaceiris/actions-gh-pages は 2024-04 以降メンテナンス停滞し
      # Node24 対応が見込めないため、Node24 対応済みの JamesIves 版に移行。
      # 同じ gh-pages ブランチ方式で API 互換性が高い。
      - name: Deploy reports to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: _gh-pages-staging
          clean: false

      # sticky-pull-request-comment: 同じ header のコメントがあれば更新、なければ新規作成
      - name: Comment PR with report links
        if: always()
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          header: web-e2e-report
          message: |
            ## 🧪 E2E Test Report

            | Report | Link |
            |--------|------|
            | Playwright HTML | https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ env.REPORT_PREFIX }}/web-e2e/html-report/ |
