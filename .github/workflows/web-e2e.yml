# E2E テストワークフロー
#
# 全 PR で起動し、paths-filter でジョブレベル skip する。
# skip されたジョブは GitHub 上で pass 扱いになるため、
# required status checks と paths フィルタを両立できる。
# Next.js アプリをビルドし、Playwright でページ遷移やレスポンシブ表示などを検証する。
# PR 時はベースブランチからベースラインを動的生成し、reg-cli で差分レポートを生成する。
name: 🧪 E2E Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pull-requests: write

# レポートの出力先プレフィックス
# PR 時: pr/{PR番号}  （例: pr/42）
# 手動実行時: manual/{実行ID}  （例: manual/12345）
env:
  REPORT_PREFIX: ${{ github.event.pull_request.number && format('pr/{0}', github.event.pull_request.number) || format('manual/{0}', github.run_id) }}

jobs:
  changes:
    name: 🧪 E2E / changes
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.filter.outputs.app }}
    steps:
      - uses: AurorNZ/paths-filter@c9dd42e99db87803313ff6f4b1150cc9f6c836af # v5
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            app:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'bun.lock'
              - '.github/workflows/web-e2e.yml'

  test:
    name: "\U0001F9EA E2E Test Report"
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      vrt-table: ${{ steps.reg-result.outputs.vrt-table }}
    steps:
      # ────────────────────────────────────────
      # セットアップ
      # ────────────────────────────────────────

      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # ベースライン生成で base branch を参照するため全履歴が必要
          fetch-depth: 0

      # bun をセットアップ（パッケージマネージャー）
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest

      # Playwright ブラウザバイナリのキャッシュ（Chromium のみ）
      # キーに Playwright バージョンを含め、バージョン更新時に自動で再ダウンロードされる
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      # キャッシュヒット時もシステム依存（libgbm 等）のインストールは必要
      - name: Install Playwright system dependencies
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      # モノレポ全体の依存関係をインストール（lockfile を厳密に使用）
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ────────────────────────────────────────
      # ベースライン生成 → ビルド → テスト実行
      # ────────────────────────────────────────

      # PR 時のみ: ベースブランチのコードからベースラインのスクリーンショットを生成し、
      # .reg/expected/ にコピーする。これにより reg-cli で差分比較が可能になる。
      # git worktree を使って別ディレクトリにベースブランチをチェックアウトし、
      # そこでビルド＆テストを実行してスクリーンショットを取得する。
      - name: Generate baselines from base branch
        if: github.event_name == 'pull_request'
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git worktree add /tmp/baseline "origin/${BASE_REF}" --detach
          cd /tmp/baseline
          bun install --frozen-lockfile
          cd apps/web
          bun run build
          bunx playwright test || true
          mkdir -p $GITHUB_WORKSPACE/apps/web/.reg/expected/
          cp -r .reg/actual/* $GITHUB_WORKSPACE/apps/web/.reg/expected/ || true
          cd $GITHUB_WORKSPACE
          git worktree remove /tmp/baseline --force

      # 現在のブランチで Next.js ビルド
      - name: Build
        run: bun run build
        working-directory: apps/web

      # Playwright テスト実行（ページ遷移・レスポンシブ検証）
      - name: Run Playwright tests
        run: bunx playwright test
        working-directory: apps/web
        env:
          CI: true

      # ────────────────────────────────────────
      # レポート生成
      # ────────────────────────────────────────

      # reg-cli: .reg/expected/（ベースライン）と .reg/actual/（現在）を比較し、
      # 差分レポートを .reg/ に生成する。結果サマリーは PR コメント用に GITHUB_OUTPUT に出力。
      - name: Run reg-cli comparison
        if: always()
        id: reg-result
        run: |
          bun run e2e:reg || true

          # .reg/out.json から各カテゴリの件数を取得
          CHANGED=$(jq '.diffItems | length' .reg/out.json)
          PASSED=$(jq '.passedItems | length' .reg/out.json)
          NEW=$(jq '.newItems | length' .reg/out.json)
          DELETED=$(jq '.deletedItems | length' .reg/out.json)

          # PR コメント用のサマリーテーブルを組み立て（reg-cli レポートと同じ順序、件数 0 は省略）
          VRT_TABLE="| Status | Count |
          |--------|-------|"
          [ "$CHANGED" -gt 0 ] && VRT_TABLE="$VRT_TABLE
          | ⚠️ Changed | $CHANGED |"
          [ "$NEW" -gt 0 ] && VRT_TABLE="$VRT_TABLE
          | 🆕 New | $NEW |"
          [ "$DELETED" -gt 0 ] && VRT_TABLE="$VRT_TABLE
          | 🗑️ Deleted | $DELETED |"
          [ "$PASSED" -gt 0 ] && VRT_TABLE="$VRT_TABLE
          | ✅ Passed | $PASSED |"

          # GITHUB_OUTPUT にヒアドキュメントで出力（複数行対応）
          echo "vrt-table<<EOF" >> $GITHUB_OUTPUT
          echo "$VRT_TABLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        working-directory: apps/web

      # ────────────────────────────────────────
      # アップロード＆デプロイ
      # ────────────────────────────────────────

      # テスト失敗時のみ: デバッグ用にテスト結果（スクリーンショット・トレース等）をアップロード
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: web-e2e-report
          path: apps/web/test-results/
          retention-days: 30

      # Playwright 標準の HTML レポートをアーティファクトとしてアップロード
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: web-e2e-html-report
          path: apps/web/playwright-report/
          retention-days: 30

      # 全レポートを1つのディレクトリにまとめ、1回の push でデプロイする。
      # keep_files: true で既存のレポートを保持する（他の PR のレポートを消さない）
      - name: Stage reports for GitHub Pages
        if: always()
        run: |
          DEST="${{ env.REPORT_PREFIX }}/web-e2e"
          mkdir -p _gh-pages-staging/${DEST}/html-report
          mkdir -p _gh-pages-staging/${DEST}/reg-report
          cp -r playwright-report/* _gh-pages-staging/${DEST}/html-report/ || true
          cp -r .reg/* _gh-pages-staging/${DEST}/reg-report/ || true
        working-directory: apps/web

      # deploy ジョブに渡すためのアーティファクト（ステージング済みディレクトリ一式）
      - name: Upload deploy payload
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: web-e2e-deploy-payload
          path: apps/web/_gh-pages-staging/
          retention-days: 1

  # ────────────────────────────────────────
  # デプロイ（gh-pages への push のみ直列化）
  # ────────────────────────────────────────
  deploy:
    name: "📊 Deploy E2E Test Report"
    needs: [changes, test]
    if: (github.event_name != 'pull_request' || needs.changes.outputs.should-run == 'true') && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # gh-pages ブランチへの push が競合しないようにキューイング
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download deploy payload
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: web-e2e-deploy-payload
          path: _gh-pages-staging/

      # peaceiris/actions-gh-pages は 2024-04 以降メンテナンス停滞し
      # Node24 対応が見込めないため、Node24 対応済みの JamesIves 版に移行。
      # 同じ gh-pages ブランチ方式で API 互換性が高い。
      - name: Deploy reports to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: _gh-pages-staging
          clean: false

      # ────────────────────────────────────────
      # PR コメント
      # ────────────────────────────────────────

      # sticky-pull-request-comment: 同じ header のコメントがあれば更新、なければ新規作成
      # 各レポートの GitHub Pages URL と reg-cli の差分サマリーを表示する
      - name: Comment PR with report links
        if: always()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: web-e2e-report
          message: |
            ## 🧪 E2E Test Report

            ${{ needs.test.outputs.vrt-table }}

            | Report | Link |
            |--------|------|
            | reg-cli | https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ env.REPORT_PREFIX }}/web-e2e/reg-report/report/ |
            | Playwright HTML | https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ env.REPORT_PREFIX }}/web-e2e/html-report/ |
