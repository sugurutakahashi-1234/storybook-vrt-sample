# ==============================================
# CI ワークフロー
# ==============================================
# 全 PR で自動実行される。
# 静的解析、ユニットテスト、ビルドを検証する。
#
# セクション構成は ci スクリプト・lefthook pre-push と統一:
#   静的解析 → ランタイム → 統合
# ==============================================
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Lint / Syncpack / Typecheck / Knip / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ── セットアップ ──
      - uses: Kesin11/actions-timeline@v3
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ── 静的解析 ──
      - name: Lint & Format
        run: bun run lint

      - name: Syncpack (version consistency)
        run: bun run syncpack

      - name: Type Check
        run: bun run typecheck

      - name: Knip (unused code detection)
        run: bun run knip

      # ── ランタイム ──
      - name: Unit Test
        run: bun run test

      # ── 統合 ──
      - name: Build
        run: bun run build
