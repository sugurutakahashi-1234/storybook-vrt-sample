# ==============================================
# CI ワークフロー
# ==============================================
# 全 PR で自動実行される。
# 静的解析、ユニットテスト、ビルドを検証する。
#
# セクション構成は ci スクリプト・lefthook pre-push と統一:
#   静的解析 → ランタイム → 統合
#
# 必要な設定:
#   Secrets:
#     DOTENV_PRIVATE_KEY — 全 .env ファイル共通の復号キー
#       dotenvx で暗号化された .env を復号し、Next.js の環境変数（NEXT_PUBLIC_SENTRY_DSN 等）を注入する
#       ※ 個別の Secrets 登録は不要。.env に変数を追加すれば CI にも自動反映される
# ==============================================
name: ✅ CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  ci:
    name: ✅ Lint / Syncpack / Typecheck / Knip / Test / Build
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ── セットアップ ──
      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ── 全チェック並列実行 ──
      # bun run --parallel: Foreman スタイルの出力で各タスクにプレフィックスが付く
      # --no-exit-on-error: 1つ失敗しても残りを最後まで実行し、全結果をまとめて確認できる
      - name: Lint / Syncpack / Typecheck / Knip / Test / Build
        run: bun run --parallel --no-exit-on-error lint syncpack typecheck knip test build
        env:
          # dotenvx が apps/web/.env を復号するために必要（Sentry DSN 等）
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
