# ==============================================
# CI ワークフロー
# ==============================================
# 全 PR で自動実行される。
# 静的解析、ユニットテスト、ビルドを検証する。
#
# セクション構成は ci スクリプト・lefthook pre-push と統一:
#   静的解析 → ランタイム → 統合
# ==============================================
name: ✅ CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  ci:
    name: ✅ Lint / Syncpack / Typecheck / Knip / Test / Build
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ── セットアップ ──
      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ── 静的解析 ──
      # ローカルでは renovate パッケージの WASM エラーにより実行不可のため CI でのみ検証
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: changes
        with:
          filters: |
            renovate:
              - 'renovate.json5'

      - name: Setup Node.js for Renovate Validator
        if: steps.changes.outputs.renovate == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Renovate Config Validator
        if: steps.changes.outputs.renovate == 'true'
        uses: suzuki-shunsuke/github-action-renovate-config-validator@ee9f69e1f683ed0d08225086482b34fc9abe9300 # v2.1.0
        with:
          config_file_path: renovate.json5

      - name: Lint & Format
        run: bun run lint

      - name: Syncpack (version consistency)
        run: bun run syncpack

      - name: Type Check
        run: bun run typecheck

      - name: Knip (unused code detection)
        run: bun run knip

      # ── ランタイム ──
      - name: Unit Test
        run: bun run test

      # ── 統合 ──
      - name: Build
        run: bun run build
