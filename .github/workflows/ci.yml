# ==============================================
# CI ワークフロー
# ==============================================
# 全 PR で自動実行される。
# 静的解析、ユニットテスト、ビルドを検証する。
#
# セクション構成は ci スクリプト・lefthook pre-push と統一:
#   静的解析 → ランタイム → 統合
# ==============================================
name: ✅ CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  ci:
    name: ✅ Lint / Syncpack / Typecheck / Knip / Test / Build
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ── セットアップ ──
      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ── 静的解析 ──
      # ローカルでは renovate パッケージの WASM エラーにより実行不可のため CI でのみ検証
      - uses: AurorNZ/paths-filter@c9dd42e99db87803313ff6f4b1150cc9f6c836af # v5
        id: changes
        with:
          filters: |
            renovate:
              - 'renovate.json5'

      - name: Setup Node.js for Renovate Validator
        if: steps.changes.outputs.renovate == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*

      - name: Renovate Config Validator
        if: steps.changes.outputs.renovate == 'true'
        uses: suzuki-shunsuke/github-action-renovate-config-validator@ee9f69e1f683ed0d08225086482b34fc9abe9300 # v2.1.0
        with:
          config_file_path: renovate.json5

      # ── 全チェック並列実行 ──
      # bun run --parallel: Foreman スタイルの出力で各タスクにプレフィックスが付く
      # --no-exit-on-error: 1つ失敗しても残りを最後まで実行し、全結果をまとめて確認できる
      - name: Lint / Syncpack / Typecheck / Knip / Test / Build
        run: bun run --parallel --no-exit-on-error lint syncpack typecheck knip test build
