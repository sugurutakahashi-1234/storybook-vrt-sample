# ==============================================
# Storybook Cloudflare Pages デプロイワークフロー
# ==============================================
# Storybook を Cloudflare Pages へデプロイする。
# - main push 時: プロダクションデプロイ
# - PR 時: プレビューデプロイ + PR コメントでリンク共有
# Cloudflare Access (Zero Trust) で認証を設定し、
# 許可されたユーザーのみがアクセスできるようにする。
#
# 必要な設定:
#   Secrets:
#     CLOUDFLARE_API_TOKEN    — Cloudflare ダッシュボード > My Profile > API Tokens（Cloudflare Pages: Edit 権限）
#   Variables:
#     CLOUDFLARE_ACCOUNT_ID   — Cloudflare ダッシュボード > Workers & Pages > Account ID
#     CF_PAGES_PROJECT_NAME   — Cloudflare Pages プロジェクト名（`<project-name>.pages.dev` のサブドメインになる）
#   Cloudflare Access: Zero Trust > Access > Applications で認証ポリシーを設定
# ==============================================
name: Storybook Cloudflare Pages Deploy

on:
  # main push 時: プロダクションデプロイ
  push:
    branches: [main]
    paths:
      - "packages/ui/**"
      - "bun.lock"
  # PR 時: プレビューデプロイを作成し、PR コメントでリンクを共有
  pull_request:
    paths:
      - "packages/ui/**"
      - "bun.lock"
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ────────────────────────────────────────
      # セットアップ
      # ────────────────────────────────────────
      - uses: Kesin11/actions-timeline@v3
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ────────────────────────────────────────
      # ビルド
      # ────────────────────────────────────────
      - name: Build Storybook
        run: bun run build-storybook
        working-directory: packages/ui

      # ────────────────────────────────────────
      # デプロイ
      # ────────────────────────────────────────

      # cloudflare/wrangler-action が wrangler のインストール・認証・デプロイを一括処理
      # wrangler.toml は不要（CLI フラグのみで完結）
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/ui/storybook-static --project-name=${{ vars.CF_PAGES_PROJECT_NAME }} --branch=${{ github.head_ref || 'main' }}

      # ────────────────────────────────────────
      # レポート
      # ────────────────────────────────────────

      # Job Summary にデプロイ結果の URL を表示
      - name: Add summary
        run: |
          echo "## 🔶 Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          echo "| Key | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Storybook | ${{ steps.deploy.outputs.deployment-url }} |" >> $GITHUB_STEP_SUMMARY

      # sticky-pull-request-comment: 同じ header のコメントがあれば更新、なければ新規作成
      - name: Comment PR with Storybook link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-storybook
          message: |
            ## 🔶 Cloudflare Pages Storybook Preview

            | Key | URL |
            |-----|-----|
            | Storybook | ${{ steps.deploy.outputs.deployment-url }} |
