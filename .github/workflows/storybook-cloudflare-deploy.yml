# ==============================================
# Storybook Cloudflare Pages デプロイワークフロー
# ==============================================
# Storybook を Cloudflare Pages へデプロイする。
# - main push 時: プロダクションデプロイ（paths フィルタで対象を限定）
# - PR 時: 全 PR で起動し、paths-filter でジョブレベル skip する
#   skip されたジョブは GitHub 上で pass 扱いになるため、
#   required status checks と paths フィルタを両立できる。
# Cloudflare Access (Zero Trust) で認証を設定し、
# 許可されたユーザーのみがアクセスできるようにする。
#
# 必要な設定:
#   Secrets:
#     CLOUDFLARE_API_TOKEN    — Cloudflare API Token「GitHub Actions - Cloudflare Pages」
#       権限: Cloudflare Pages: Edit
#       ※ Terraform 用トークン（infra/cloudflare-access/.env で管理）とは別トークン
#   Variables:
#     CLOUDFLARE_ACCOUNT_ID   — Cloudflare ダッシュボード > Workers & Pages > Account ID（`bunx wrangler whoami` でも確認可）
#     CF_PAGES_PROJECT_NAME   — Cloudflare Pages プロジェクト名（`<project-name>.pages.dev` のサブドメインになる）
#   初回セットアップ:
#     bunx wrangler pages project create <project-name> --production-branch main
#   Cloudflare Access: Zero Trust > Access > Applications で認証ポリシーを設定
# ==============================================
name: ☁️ Storybook Cloudflare Pages Deploy

on:
  # main push 時: プロダクションデプロイ
  push:
    branches: [main]
    paths:
      - "packages/ui/**"
      - "bun.lock"
      - ".github/workflows/storybook-cloudflare-deploy.yml"
  # PR 時: 全 PR で起動し、changes ジョブで paths をチェック（Draft PR は skip）
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write

jobs:
  changes:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            ui:
              - 'packages/ui/**'
              - 'bun.lock'
              - '.github/workflows/storybook-cloudflare-deploy.yml'

  deploy:
    name: ☁️ Deploy to Cloudflare Pages
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ────────────────────────────────────────
      # セットアップ
      # ────────────────────────────────────────
      - uses: Kesin11/actions-timeline@v3
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # ────────────────────────────────────────
      # ビルド
      # ────────────────────────────────────────
      - name: Build Storybook
        run: bun run build-storybook
        working-directory: packages/ui

      # ────────────────────────────────────────
      # デプロイ
      # ────────────────────────────────────────

      # cloudflare/wrangler-action が wrangler のインストール・認証・デプロイを一括処理
      # wrangler.toml は不要（CLI フラグのみで完結）
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/ui/storybook-static --project-name=${{ vars.CF_PAGES_PROJECT_NAME }} --branch=${{ github.head_ref || 'main' }}

      # ────────────────────────────────────────
      # レポート
      # ────────────────────────────────────────

      # Job Summary にデプロイ結果の URL を表示
      - name: Add summary
        run: |
          echo "## ☁️ Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          echo "| Key | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Storybook | ${{ steps.deploy.outputs.deployment-url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | https://dash.cloudflare.com/${{ vars.CLOUDFLARE_ACCOUNT_ID }}/pages/view/${{ vars.CF_PAGES_PROJECT_NAME }}/${{ steps.deploy.outputs.pages-deployment-id }} |" >> $GITHUB_STEP_SUMMARY

      # sticky-pull-request-comment: 同じ header のコメントがあれば更新、なければ新規作成
      - name: Comment PR with Storybook link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-storybook
          message: |
            ## ☁️ Cloudflare Pages Storybook Preview

            | Key | URL |
            |-----|-----|
            | Storybook | ${{ steps.deploy.outputs.deployment-url }} |
            | Dashboard | https://dash.cloudflare.com/${{ vars.CLOUDFLARE_ACCOUNT_ID }}/pages/view/${{ vars.CF_PAGES_PROJECT_NAME }}/${{ steps.deploy.outputs.pages-deployment-id }} |
