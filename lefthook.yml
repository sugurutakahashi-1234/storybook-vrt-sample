# ==============================================
# Git Hooks 設定（Lefthook）
# ==============================================
# post-checkout: ブランチ切替時の自動処理
# post-merge:    マージ・プル時の自動処理
# pre-commit:    ステージされたファイルのみ対象（高速）
# pre-push:      プロジェクト全体を対象（プッシュ前の最終チェック）
#
# ==============================================

# 出力制御: 成功ジョブの冗長なログを抑制し、失敗時のエラーのみ表示
output:
  - summary
  - failure

# ブランチ切替時: bun.lock に変更があれば依存関係を自動同期
# post-checkout は 3 引数（前 HEAD, 後 HEAD, ブランチフラグ）を受け取る
# {1} = ブランチ切替フラグ（1: ブランチ切替、0: ファイルチェックアウト）
post-checkout:
  jobs:
    - name: sync-bun-deps
      run: |
        [ "{1}" != "1" ] && exit 0
        git diff HEAD@{1} HEAD --quiet -- bun.lock 2>/dev/null || bun install --frozen-lockfile
    # mise.toml に変更があればツールを自動インストール
    - name: sync-mise-tools
      run: |
        [ "{1}" != "1" ] && exit 0
        git diff HEAD@{1} HEAD --quiet -- mise.toml 2>/dev/null || mise install

# マージ・プル時: bun.lock / mise.toml に変更があれば自動同期
post-merge:
  jobs:
    - name: sync-bun-deps
      run: git diff HEAD@{1} HEAD --quiet -- bun.lock 2>/dev/null || bun install --frozen-lockfile
    - name: sync-mise-tools
      run: git diff HEAD@{1} HEAD --quiet -- mise.toml 2>/dev/null || mise install

# コミット時: ステージされたファイルに対して実行
# 手動実行: bunx lefthook run pre-commit --force
pre-commit:
  parallel: true
  jobs:
    # main ブランチへの直接コミットを禁止
    - name: protect-main
      run: '[ "$(git branch --show-current)" = "main" ] && echo "❌ main ブランチへの直接コミットは禁止です" && exit 1 || exit 0'
    # Oxlint によるリント自動修正
    # oxlint は JS/TS のみ対応のため、JSON/CSS は対象外
    - name: oxlint-fix
      timeout: 20s
      run: bunx oxlint --fix {staged_files}
      glob: "**/*.{js,jsx,ts,tsx}"
      exclude: "**/next-env.d.ts"
      stage_fixed: true
    # Oxfmt によるフォーマット自動修正
    # oxfmt は JSON/JSONC/CSS/MD/YML もフォーマット可能なため、oxlint より対象を広げている
    - name: oxfmt-fix
      timeout: 20s
      run: bunx oxfmt --write {staged_files}
      glob: "**/*.{js,jsx,ts,tsx,json,jsonc,css,md,yml}"
      exclude: "**/next-env.d.ts"
      stage_fixed: true
    # コンフリクトマーカー（<<<<<<< 等）の残存チェック
    - name: conflict-markers
      timeout: 20s
      run: grep -nE '^<<<<<<< |^=======$|^>>>>>>> ' {staged_files} < /dev/null && echo "コンフリクトマーカーが残っています" && exit 1 || exit 0
      glob:
        - "**/*.{js,jsx,ts,tsx,json,jsonc,css,md,yml,yaml}"
    # .env ファイルの誤コミット防止
    # dotenvx で暗号化済み（DOTENV_PUBLIC_KEY を含む）なら許可、それ以外はブロック
    # .env.keys は .gitignore で除外済み
    - name: no-secrets
      run: |
        for f in $(git diff --cached --name-only | grep -E '\.env($|\.)'); do
          if ! grep -q 'DOTENV_PUBLIC_KEY' "$f" 2>/dev/null; then
            echo "❌ $f は暗号化されていません（dotenvx encrypt で暗号化してください）" && exit 1
          fi
        done
    # Terraform（infra/ にモジュールが増えたらパス追加 or for ループに変更）
    # フォーマット自動修正（fmt -recursive は infra/ 全体を対象にするため変更不要）
    - name: terraform-fmt
      run: terraform fmt -recursive infra/
      glob: "infra/**/*.tf"
      stage_fixed: true
    # Terraform バリデーション（init は .terraform がなければ自動実行）
    - name: terraform-validate
      run: "[ -d infra/cloudflare-access/.terraform ] || terraform -chdir=infra/cloudflare-access init -backend=false -input=false > /dev/null 2>&1 && terraform -chdir=infra/cloudflare-access validate"
      glob: "infra/**/*.tf"
    # Terraform リンター（ベストプラクティス・非推奨属性のチェック）
    - name: tflint
      run: tflint --chdir=infra/cloudflare-access
      glob: "infra/**/*.tf"

# プッシュ時: プロジェクト全体に対して実行
# 手動実行: bunx lefthook run pre-push --force
pre-push:
  parallel: true
  jobs:
    # main ブランチへの直接プッシュを禁止
    - name: protect-main
      run: '[ "$(git branch --show-current)" = "main" ] && echo "❌ main ブランチへの直接プッシュは禁止です" && exit 1 || exit 0'
    # マージ済み PR のブランチへのプッシュを防止（gh CLI 必須）
    - name: prevent-push-merged-branch
      run: |
        branch=$(git branch --show-current)
        [ "$branch" = "main" ] && exit 0
        state=$(gh pr view "$branch" --json state --jq .state 2>/dev/null || echo "NONE")
        [ "$state" = "MERGED" ] && echo "❌ このブランチの PR は既にマージ済みです" && exit 1 || exit 0

    # ── 静的解析 ──
    # Oxlint + Oxfmt によるリント + フォーマットチェック（修正なし、CI と同等）
    - name: lint-check
      timeout: 20s
      run: bun run lint || (echo "" && echo "❌ リント/フォーマットエラーがあります" && echo "👉 bun run lint:fix で自動修正" && exit 1)
    # 依存パッケージバージョン整合性チェック（モノレポ内で同一パッケージのバージョンが揃っているか）
    - name: syncpack
      timeout: 20s
      run: bun run syncpack || (echo "" && echo "❌ パッケージバージョンが不整合です" && echo "👉 bun syncpack fix で自動修正" && exit 1)
    # TypeScript 型チェック（tsgo --noEmit）
    - name: typecheck
      timeout: 20s
      run: bun run typecheck || (echo "" && echo "❌ 型エラーがあります" && echo "👉 bun run typecheck で詳細を確認" && exit 1)
    # 未使用ファイル・依存関係チェック
    - name: knip
      timeout: 20s
      run: bun run knip || (echo "" && echo "❌ 未使用のファイル・依存関係があります" && echo "👉 bun run knip で詳細を確認" && exit 1)

    # ── ランタイム ──
    # bun バージョン整合性チェック（packageManager vs インストール済みバージョン）
    - name: bun-version-check
      timeout: 20s
      run: bun run bun-version-check || (echo "" && echo "❌ bun のバージョンが不一致です" && echo "👉 package.json の packageManager を確認" && exit 1)
    # ユニットテスト（bun test）
    - name: unit-test
      timeout: 20s
      run: bun run test || (echo "" && echo "❌ ユニットテストが失敗しました" && echo "👉 bun run test で詳細を確認" && exit 1)

    # ── 統合 ──
    # Next.js ビルド
    - name: build
      timeout: 20s
      run: bun run build || (echo "" && echo "❌ ビルドに失敗しました" && echo "👉 bun run build で詳細を確認" && exit 1)

    # ── ビジュアルテスト ──
    # Storybook テスト群（Vitest browser mode）
    # 並列実行のために 2 種類のキャッシュをプロジェクトごとに分離している。
    # 1. cacheDir: Vite の deps 事前バンドルキャッシュ（vitest.config.ts で設定）
    # 2. CACHE_DIR 環境変数: Storybook の sb-vitest キャッシュ（以下で設定）
    # 両者は独立しており、それぞれ個別に分離が必要。
    # 未分離だと "Failed to fetch dynamically imported module" が発生する。
    #
    # storybook-snapshot も storybookTest プラグインを含むため
    # play 関数・a11y チェックは light で重複実行される。
    # storybook:test は dark モードの a11y チェックを担うため残している。
    - name: storybook:test
      skip:
        # packages/ui/ または bun.lock に変更がなければスキップ
        - run: git diff origin/main...HEAD --quiet -- 'packages/ui/' 'bun.lock'
      timeout: 20s
      run: CACHE_DIR=packages/ui/node_modules/.cache/sb-test bun run storybook:test || (echo "" && echo "❌ Storybook テストが失敗しました" && echo "👉 bun run storybook:test で詳細を確認" && exit 1)
    - name: storybook-snapshot
      skip:
        # packages/ui/ または bun.lock に変更がなければスキップ
        - run: git diff origin/main...HEAD --quiet -- 'packages/ui/' 'bun.lock'
      timeout: 20s
      run: CACHE_DIR=packages/ui/node_modules/.cache/sb-snapshot bun run storybook:snapshot && git diff --quiet packages/ui/vrt/screenshots/ && ! git ls-files --others --exclude-standard packages/ui/vrt/screenshots/ | grep -q . || (echo "" && echo "❌ VRT スクリーンショットに差分があります" && echo "👉 bun run storybook:snapshot && git add packages/ui/vrt/screenshots/ && git commit" && exit 1)
    # E2E テスト（Playwright / Next.js dev サーバーを自動起動して実行）
    # スクリーンショットに差分があれば push を失敗させる（コミットし忘れ防止）
    - name: e2e-test
      skip:
        # packages/ui/、apps/web/、bun.lock のすべてに変更がなければスキップ
        - run: git diff origin/main...HEAD --quiet -- 'packages/ui/' 'apps/web/' 'bun.lock'
      timeout: 20s
      run: bun run e2e && git diff --quiet apps/web/e2e/screenshots/ && ! git ls-files --others --exclude-standard apps/web/e2e/screenshots/ | grep -q . || (echo "" && echo "❌ E2E スクリーンショットに差分があります" && echo "👉 bun run e2e && git add apps/web/e2e/screenshots/ && git commit" && exit 1)

    # ── Terraform ──
    # terraform apply 漏れ検出
    # infra/ の .tf 変更後に apply し忘れた状態での push を防止する
    # .env.keys がなければ plan 実行不可のためブロック（infra/ を変更するなら復号キーが必要）
    - name: terraform-plan-check
      skip:
        # infra/ に変更がなければスキップ
        - run: git diff origin/main...HEAD --quiet -- 'infra/'
      timeout: 30s
      run: |
        for dir in infra/*/; do
          keys_file="${dir}.env.keys"
          if [ ! -f "$keys_file" ]; then
            echo "❌ $dir: .env.keys がないため apply 漏れを確認できません"
            echo "👉 復号キーをパスワードマネージャー等から取得してください"
            exit 1
          fi
          [ -d "$dir.terraform" ] || (cd "$dir" && dotenvx run -- terraform init -input=false > /dev/null 2>&1)
          cd "$dir" && dotenvx run -- terraform plan -detailed-exitcode -no-color > /dev/null 2>&1
          exit_code=$?
          cd - > /dev/null
          if [ "$exit_code" = "2" ]; then
            echo "" && echo "❌ $dir に未適用の変更があります" && echo "👉 cd $dir && dotenvx run -- terraform apply" && exit 1
          elif [ "$exit_code" = "1" ]; then
            echo "" && echo "❌ $dir の terraform plan でエラーが発生しました" && exit 1
          fi
          echo "✅ $dir: 適用済み"
        done
